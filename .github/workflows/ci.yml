name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

env:
  # 4.7 stable has no patch number, so the version string is just "4.7"
  # (release tag 4.7-stable, file Godot_v4.7-stable_*, templates dir 4.7.stable).
  GODOT_VERSION: "4.7"

jobs:
  # GDScript isn't compiled, so "build" for this project means: import all
  # resources headlessly, run the headless regression tests, and load every
  # playable scene watching for script/resource errors — the same verification
  # workflow used locally (see README).
  verify:
    name: Verify (import, tests, scene loads)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/godot-bin
          key: godot-${{ env.GODOT_VERSION }}-linux

      - name: Download Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot-bin
          curl -fsSL -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q godot.zip
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" ~/godot-bin/godot
          chmod +x ~/godot-bin/godot

      - name: Add Godot to PATH
        run: echo "$HOME/godot-bin" >> "$GITHUB_PATH"

      - name: Import resources
        # First import on a clean checkout may exit non-zero while generating
        # .godot/; the strict scene loads below catch anything truly broken.
        run: godot --headless --path . --import || true

      - name: Run headless regression tests
        # These scenes quit(1) on failure, so the exit code is the verdict.
        run: |
          godot --headless --path . res://tests/bevel_smoke.tscn
          godot --headless --path . res://tests/robot_models_check.tscn

      - name: Load-test all levels, cutscenes and menu
        run: |
          fail=0
          for scene in scenes/levels/*.tscn scenes/cutscene/*.tscn scenes/ui/main_menu.tscn; do
            res="res://${scene}"
            echo "::group::${res}"
            out=$(godot --headless --path . "$res" --quit-after 240 2>&1) || true
            echo "$out"
            echo "::endgroup::"
            # "N resources still in use at exit" is a known-benign teardown
            # race: any audio stream playing at the --quit-after frame can be
            # held by the mixer thread past the resource-cleanup check (same
            # family as the tolerated ObjectDB exit warning). Everything else
            # stays fatal.
            if echo "$out" | grep -E "SCRIPT ERROR|ERROR:" | grep -vE "still in use at exit" | grep -q .; then
              echo "::error::Errors while running ${res}"
              fail=1
            fi
          done
          exit $fail

  # Real game binaries (Linux + Windows, pck embedded). Runs on version tags
  # and manual dispatch — the export templates are a ~1 GB download, so this
  # is kept off the per-push path.
  export:
    name: Export game binaries
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/godot-bin
          key: godot-${{ env.GODOT_VERSION }}-linux

      - name: Download Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot-bin
          curl -fsSL -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q godot.zip
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" ~/godot-bin/godot
          chmod +x ~/godot-bin/godot

      - name: Add Godot to PATH
        run: echo "$HOME/godot-bin" >> "$GITHUB_PATH"

      - name: Cache export templates
        id: cache-templates
        uses: actions/cache@v4
        with:
          path: ~/.local/share/godot/export_templates
          key: godot-templates-${{ env.GODOT_VERSION }}

      - name: Download export templates
        if: steps.cache-templates.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          mkdir -p ~/.local/share/godot/export_templates
          unzip -q templates.tpz -d /tmp/templates
          mv /tmp/templates/templates ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Import resources
        run: godot --headless --path . --import || true

      - name: Export Linux
        run: |
          mkdir -p build/linux
          godot --headless --path . --export-release "Linux" build/linux/ai-uprising.x86_64

      - name: Export Windows
        run: |
          mkdir -p build/windows
          godot --headless --path . --export-release "Windows Desktop" build/windows/ai-uprising.exe

      - name: Bundle attribution
        # CREDITS.md ships beside the binary: the boss model is CC-BY-4.0 and
        # the Orbitron font's OFL wants its license text distributed.
        run: |
          cp CREDITS.md build/linux/
          cp CREDITS.md build/windows/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-uprising-linux-x86_64
          path: build/linux/

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-uprising-windows-x86_64
          path: build/windows/

  # Push tagged builds to itch.io with butler. Two pieces of repo config
  # enable this job (it is skipped until both exist):
  #   - repository VARIABLE  ITCH_PROJECT   e.g. "youruser/ai-uprising"
  #   - repository SECRET    BUTLER_API_KEY (itch.io -> Settings -> API keys)
  # The "linux"/"windows" channel names map to itch.io platform tags.
  # Steam: once a Steamworks app exists (paid registration + appid/depots),
  # add a sibling job here that pushes the same build/ dirs via steamcmd.
  publish-itch:
    name: Publish to itch.io
    needs: export
    if: startsWith(github.ref, 'refs/tags/v') && vars.ITCH_PROJECT != ''
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: ai-uprising-linux-x86_64
          path: build/linux

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: ai-uprising-windows-x86_64
          path: build/windows

      - name: Install butler
        run: |
          curl -fsSL -o butler.zip \
            "https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default"
          mkdir -p ~/butler
          unzip -q butler.zip -d ~/butler
          chmod +x ~/butler/butler
          echo "$HOME/butler" >> "$GITHUB_PATH"

      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          # Artifact transport drops the exec bit; restore it for Linux.
          chmod +x build/linux/ai-uprising.x86_64
          ver="${GITHUB_REF_NAME#v}"
          butler push build/linux   "${{ vars.ITCH_PROJECT }}:linux"   --userversion "$ver"
          butler push build/windows "${{ vars.ITCH_PROJECT }}:windows" --userversion "$ver"
